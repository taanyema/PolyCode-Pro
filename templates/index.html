<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyCode Pro - Terminal Élite</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-matlab.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register("/sw.js") // Ajoute le slash ici
        .then(reg => console.log("SW OK"))
        .catch(err => console.log("SW Erreur", err));
    });
  }
</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <div id="auth-screen">
        <div class="login-card">
            <p class="secure-text">🔒 ACCÈS SÉCURISÉ BURKINA</p>
            <h2>🚀 Terminal Home</h2>

            <input type="text" id="username" placeholder="Nom complet">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Mot de passe">

            <button class="btn-login" onclick="entrerDansLeTerminal()">S'INSCRIRE / CONNECTER</button>

            <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
                <p style="color: #94a3b8; font-size: 0.8em; margin-bottom: 15px; text-align: center;">OU</p>

                <button onclick="connexionGoogle()" style="width: 100%; padding: 12px; cursor: pointer; border-radius: 8px; border: none; background: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; color: #334155; shadow: 0 4px 6px rgba(0,0,0,0.2);">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                    Continuer avec Google
                </button>
            </div>
        </div>
    </div>
    
    <div id="terminal-screen" style="display: none;">
        <header class="pro-header">
            <div class="logo-box">💻 PolyCode Pro</div>
            <div class="header-tools">
    <span style="cursor:pointer;" onclick="basculerLangueInterface()">🇫🇷</span>

     <button onclick="deconnexion()" style="background:none; border:none; cursor:pointer; font-size:1.2em;" title="Déconnexion">🚪</button>
                
    <button class="ai-btn" id="ai-btn" onclick="demanderAideIA()">+ Aide IA</button>
    
    <button class="icon-btn" onclick="toggleTheme()">🌗</button>
            </div>
        </header>
        
        <div class="editor-toolbar">
            <div class="left-tools">
                <select id="lang-select" onchange="updateEditor()">
                    <option value="scilab" selected>📊 Scilab</option>
                    <option value="python">🐍 Python</option>
                    <option value="c">📄 C</option>
                    <option value="cpp">💎 C++</option>
                </select>
                <button class="btn-tool" onclick="changeFontSize(-1)">A-</button>
                <button class="btn-tool" onclick="changeFontSize(1)">A+</button>
            </div>

            <div class="action-group">
                <button class="btn-clear" onclick="effacerConsole()">EFFACER</button>
                <button class="btn-run" onclick="lancerCode()">LANCER ▶</button>
            </div>
        </div>

        <div class="shortcut-bar">
            <button onclick="addCode('\t')">TAB</button>
            <button onclick="addCode('(')">(</button>
            <button onclick="addCode(')')">)</button>
            <button onclick="addCode('{')">{</button>
            <button onclick="addCode('}')">}</button>
            <button onclick="addCode(';')">;</button>
            <button onclick="addCode(':')">:</button>
            <button onclick="addCode('=')">=</button>
        </div>

        <div class="code-zone">
            <div class="line-numbers" id="line-numbers">1</div>
            <div class="editor-wrapper">
                <pre id="highlight-layer" aria-hidden="true"></pre>
                <textarea id="editor" spellcheck="false" 
                          oninput="updateEditor()" 
                          onscroll="syncScroll()"
                          placeholder="Écris ton code ici..."></textarea>
            </div>
        </div>

        <div id="console-bottom">
            <div id="console-output">
                <span class="console-label">> Console prête...</span>
            </div>
        </div>
    </div>

    <div id="plot-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#161b22; padding:15px; border-radius:10px; border:1px solid #30363d; width:95%; max-width:600px; text-align:center;">
        <h3 style="color:#7ee787; margin-top:0; font-family: sans-serif;">📊 Analyse PolyCode</h3>
        
        <div style="background: white; border-radius: 8px; padding: 10px; height: 400px;">
            <canvas id="polyChart"></canvas>
        </div>

        <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
            <button onclick="telechargerGraphique()" style="background:#238636; color:white; border:none; padding:12px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">💾 ENREGISTRER</button>
            
            <button onclick="fermerGraphique()" style="background:#f85149; color:white; border:none; padding:12px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">FERMER</button>
        </div>
    </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
